services:
  - type: web
    name: pbl-question-lab
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && npm start
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pbl-question-lab-db
          property: connectionString

databases:
  - name: pbl-question-lab-db
    plan: free
